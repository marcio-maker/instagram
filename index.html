    <script>

                tema: tema,
                titulo: tituloGrupo,
                slides: frasesArray.map((item, idx) => ({
                    sequencia: idx + 1,
                    frase: item.frase,
                    subtitulo: item.subtitulo

        function mostrarToast(mensagem) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function obterNomeCategoria(tema) {
            const nomes = {
                carreira: 'Carreira',
                programacao: 'Programação',
                frontend: 'Front-end',
                react: 'React',
                ia: 'IA',
                design: 'Design',
                github: 'GitHub',
                softskills: 'Soft Skills',
                dados: 'Dados',
                backend: 'Back-end',
                inovacao: 'Inovação',
                curtas: 'Frases Curtas'
            };
            return nomes[tema] || tema;
        }

        function obterDimensoesFormato(formato) {
            const formatos = {
                '1:1': '1080x1080',
                '4:5': '1080x1350',
                '16:9': '1080x608',
                '9:16': '1080x1920'
            };
            return formatos[formato] || '1080x1350';
        }

        function gerarCarrosselUnico() {
            gerarBtn.classList.add('loading');

            setTimeout(() => {
                const filtroCategoria = document.getElementById('filtroCategoria').value;

                let disponiveis = CARROSSEIS_TOTAIS;
                if (filtroCategoria !== 'todas') {
                    disponiveis = CARROSSEIS_TOTAIS.filter(c => c.tema === filtroCategoria);
                }

                if (disponiveis.length === 0) {
                    mostrarToast('❌ Nenhum carrossel disponível para esta categoria');
                    gerarBtn.classList.remove('loading');
                    return;
                }

                const naoUsados = disponiveis.filter((_, idx) => !carrosseisUsados.includes(idx));

                if (naoUsados.length === 0) {
                    mostrarToast('🎉 Parabéns! Você usou todos os 60 carrosséis!');
                    gerarBtn.classList.remove('loading');
                    return;
                }

                const escolhido = naoUsados[Math.floor(Math.random() * naoUsados.length)];
                const indiceEscolhido = CARROSSEIS_TOTAIS.findIndex(c => c === escolhido);

                carrosseisUsados.push(indiceEscolhido);
                contadorGeracoes++;

                contadorGeracoesSpan.textContent = contadorGeracoes;
                temasRestantesSpan.textContent = CARROSSEIS_TOTAIS.length - carrosseisUsados.length;

                categoriaAtualSpan.textContent = obterNomeCategoria(escolhido.tema);
                grupoAtualSpan.textContent = escolhido.titulo;
                progressoGrupoSpan.textContent = '5 slides';

                const estilo = document.getElementById('estilo').value;
                const formato = document.getElementById('formato').value;
                const dimensoes = obterDimensoesFormato(formato);

                const estilos = {
                    moderno: "moderno, clean, profissional, alta qualidade, iluminação suave, tons de azul e roxo",
                    minimalista: "minimalista, sóbrio, elegante, poucos elementos, fundo limpo, tons neutros",
                    neon: "neon, cores vibrantes, roxo e azul, iluminação noturna, cyberpunk, glow effects",
                    futurista: "futurista, tecnológico, inovador, high tech, digital art, hologramas",
                    escuro: "dark mode, escuro, sofisticado, contraste, iluminação dramática, tons escuros"
                };

                // PROMPT COM 5 SLIDES - SEM TÍTULO DE ABERTURA
                const descricaoSlides = escolhido.slides.map(s => 
                    `SLIDE ${s.sequencia}: "${s.frase}" (subtítulo: "${s.subtitulo}")`
                ).join('\n');

                const promptIA = `Crie um CARROSSEL de 5 imagens para Instagram no formato ${formato} (${dimensoes} pixels). As 5 imagens devem formar uma sequência coesa, todas com o MESMO DNA visual.

CATEGORIA: ${obterNomeCategoria(escolhido.tema)}
TEMA DO CARROSSEL: ${escolhido.titulo}

FUNDO / ESTILO PARA TODAS AS IMAGENS: ${estilos[estilo]}, relacionado a: ${escolhido.fundo}

SEQUÊNCIA DE SLIDES (cada um com sua frase principal e subtítulo):
${descricaoSlides}

REGRAS PARA CADA SLIDE:
- Frase principal em EVIDÊNCIA, centralizada, fonte grande e legível (branca ou clara)
- Subtítulo abaixo, em fonte menor, com fundo semi-transparente
- Aplicar gradiente escuro sobre a imagem para garantir legibilidade
- No rodapé, em fonte discreta: "makerai"
- NÃO colocar outras marcas ou logos
- NÃO incluir título de abertura ou introdução; comece diretamente com o SLIDE 1

IMPORTANTE:
- As 5 imagens devem ser visualmente consistentes (mesmo fundo, mesma paleta, mesma vibe)
- O fundo de cada imagem deve complementar a frase específica, mas mantendo a unidade do grupo
- Use elementos visuais que remetam à descrição do fundo: ${escolhido.fundo}`;

                // TEXTO DA LEGENDA (APENAS AS 5 FRASES)
                const textoLegenda = escolhido.slides.map(s => 
                    `🔹 *${s.frase}*\n${s.subtitulo}`
                ).join('\n\n') + `\n\n——\n✨ Gostou? Salve este carrossel e compartilhe!`;

                // HASHTAGS
                const tagsTema = hashtagsTemas[escolhido.tema] || hashtagsTemas.carreira;
                const hashtagsEmbaralhadas = [...tagsTema].sort(() => 0.5 - Math.random());
                const hashtagsSelecionadas = hashtagsEmbaralhadas.slice(0, 12);
                const hashtagsFixas = ["#MakerAI", "#CarrosselDev", "#DicasDev"];
                const hashtagsFinais = [...new Set([...hashtagsSelecionadas, ...hashtagsFixas])].sort();

                promptIADiv.textContent = promptIA;
                editorPrompt.value = promptIA;
                promptOriginal = promptIA;
                textoCarrosselDiv.innerHTML = `<p>${textoLegenda.replace(/\n/g, '<br>')}</p>`;
                hashtagsListaDiv.innerHTML = hashtagsFinais.join(' · ');

                resultadoDiv.style.display = 'block';

                setTimeout(() => {
                    resultadoDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);

                ultimoCarrossel = {
                    prompt: promptIA,
                    legenda: textoLegenda,
                    hashtags: hashtagsFinais,
                    categoria: obterNomeCategoria(escolhido.tema),
                    titulo: escolhido.titulo
                };

                gerarBtn.classList.remove('loading');
            }, 300);
        }

        function copiarTexto(texto, mensagem) {
            navigator.clipboard.writeText(texto).then(() => {
                mostrarToast(mensagem);
            }).catch(() => {
                mostrarToast('❌ Erro ao copiar');
            });
        }

        function copiarPrompt() {
            if (!ultimoCarrossel) return mostrarToast('❌ Gere um carrossel primeiro');
            copiarTexto(ultimoCarrossel.prompt, '✅ Prompt copiado!');
        }

        function copiarLegenda() {
            if (!ultimoCarrossel) return mostrarToast('❌ Gere um carrossel primeiro');
            copiarTexto(ultimoCarrossel.legenda, '✅ Legenda copiada!');
        }

        function copiarHashtags() {
            if (!ultimoCarrossel) return mostrarToast('❌ Gere um carrossel primeiro');
            copiarTexto(ultimoCarrossel.hashtags.join(' '), '✅ Hashtags copiadas!');
        }

        function copiarTudo() {
            if (!ultimoCarrossel) return mostrarToast('❌ Gere um carrossel primeiro');
            const textoCompleto = `${ultimoCarrossel.legenda}\n\n${ultimoCarrossel.hashtags.join(' ')}\n\n---\nPROMPT DAS IMAGENS:\n${ultimoCarrossel.prompt}`;
            copiarTexto(textoCompleto, '✅ Tudo copiado!');
        }

        function copiarEditor() {
            if (!editorPrompt.value) return mostrarToast('❌ Nada para copiar');
            copiarTexto(editorPrompt.value, '✅ Prompt editado copiado!');
        }

        function restaurarOriginal() {
            if (promptOriginal) {
                editorPrompt.value = promptOriginal;
                mostrarToast('✅ Prompt original restaurado');
            } else {
                mostrarToast('❌ Nenhum prompt original encontrado');

                ultimoCarrossel = null;

                grupoAtualSpan.textContent = 'Carrossel';
                progressoGrupoSpan.textContent = '5 slides';
                mostrarToast('✅ Progresso resetado!');
            }
        }
